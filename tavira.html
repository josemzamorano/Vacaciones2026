<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tavira y Santa Luzia</title>

<style>
    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
    }

    body {
        background: #eef4fa;
        color: #17324d;
        min-height: 100vh;
    }

    .hero {
        background: linear-gradient(135deg, #0b4ea2, #2c7be5);
        color: white;
        text-align: center;
        padding: 50px 20px;
    }

    .hero h1 {
        font-size: 2.5rem;
    }

    .contenedor {
        max-width: 1200px;
        margin: auto;
        padding: 40px 20px;
    }

    .descripcion {
        text-align: center;
        font-size: 1.2rem;
        margin-bottom: 40px;
        line-height: 1.6;
    }

    .galeria {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
        gap: 25px;
    }

    .foto {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 5px 20px rgba(0,0,0,0.10);
        transition: transform 0.3s;
    }

    .foto:hover {
        transform: translateY(-5px);
    }

    .foto img {
        width: 100%;
        height: 250px;
        object-fit: cover;
        display: block;
    }

    .foto p {
        padding: 15px;
        text-align: center;
        font-weight: bold;
    }

    .volver {
        text-align: center;
        margin: 50px 0;
    }

    .volver a {
        display: inline-block;
        background: #0b4ea2;
        color: white;
        text-decoration: none;
        padding: 15px 30px;
        border-radius: 50px;
        font-size: 1.1rem;
        transition: background 0.3s;
    }

    .volver a:hover {
        background: #083a7d;
    }

    @media (max-width: 768px) {
        .hero h1 {
            font-size: 2rem;
        }

        .descripcion {
            font-size: 1rem;
        }
    }
</style>

</head>
<body>

<header class="hero">
    <h1>🏖️ Tavira y Santa Luzia</h1>
</header>

<div class="contenedor">

    <p class="descripcion">
        En Tavira merece la pena: Puente romano, Castillo, Jardines, Calles blancas, Plaza de la República.
    </p>

    <div class="galeria">

        <div class="foto">
            <img src="images/tavira1.jpg" alt="Foto 1">
            <p>Cementerio de Anclas</p>
        </div>

        <div class="foto">
            <img src="images/tavira2.jpg" alt="Foto 2">
            <p>Tavira, La Venecia del Algarve</p>
        </div>

        <div class="foto">
            <img src="images/tavira3.jpg" alt="Foto 3">
            <p>Puente Romano</p>
        </div>
		<div class="foto">
            <img src="images/tavira4.jpg" alt="Foto 3">
            <p>Impresionantes puestas de sol</p>
        </div>
		<div class="foto">
            <img src="images/tavira5.jpg" alt="Foto 3">
            <p>Plaza de la República</p>
        </div>
		<div class="foto">
            <img src="images/tavira6.jpg" alt="Foto 3">
            <p>Santa Luzia</p>
        </div>

    </div>

    <div class="volver">
        <a href="index.html">⬅️ Volver al viaje</a>
    </div>

</div>

</body>
</html>
